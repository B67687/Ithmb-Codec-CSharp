<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!-- Outer click wheel ring -->
  <circle cx="48" cy="48" r="46" fill="#f2f2f2" stroke="#c0c0c0" stroke-width="1.5"/>
  <circle cx="48" cy="48" r="40" fill="#e0e0e0" stroke="#b8b8b8" stroke-width="0.5"/>

  <!-- Position dots -->
  <circle cx="48" cy="11" r="3" fill="#aaa"/>
  <circle cx="48" cy="85" r="3" fill="#aaa"/>
  <circle cx="11" cy="48" r="3" fill="#aaa"/>
  <circle cx="85" cy="48" r="3" fill="#aaa"/>

  <!-- Center select button -->
  <circle cx="48" cy="48" r="24" fill="#d5d5d5" stroke="#b0b0b0" stroke-width="1"/>

  <!-- Thumbnail frame inside center -->
  <rect x="31" y="33" width="34" height="30" rx="4" fill="#fff" stroke="#999" stroke-width="1.5"/>

  <!-- Decoder play triangle -->
  <polygon points="43,39 43,57 57,48" fill="#0078d4"/>
